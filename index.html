<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>ArcPro Wallet</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.1/dist/ethers.umd.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#050816;
color:white;
padding:20px;
}

.container{
max-width:430px;
margin:auto;
}

.card{
background:#0b1222;
border:1px solid #1d2a52;
border-radius:22px;
padding:20px;
margin-top:20px;
}

.title{
font-size:28px;
font-weight:bold;
}

.subtitle{
margin-top:8px;
color:#8ea2ff;
font-size:14px;
}

.balanceBox{
margin-top:20px;
background:#09101d;
padding:20px;
border-radius:18px;
}

.balanceText{
color:#8ca0ff;
font-size:14px;
}

.balanceValue{
font-size:34px;
font-weight:bold;
margin-top:10px;
color:#00ff9d;
}

.wallet{
margin-top:15px;
font-size:14px;
word-break:break-word;
}

.network{
margin-top:10px;
font-size:14px;
color:#8ca0ff;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:14px;
background:#3154ff;
color:white;
font-size:16px;
cursor:pointer;
margin-top:15px;
font-weight:bold;
}

input{
width:100%;
padding:15px;
margin-top:12px;
background:#09101d;
border:1px solid #22345f;
border-radius:14px;
color:white;
}

.status{
margin-top:15px;
font-size:14px;
color:#91a4ff;
word-break:break-word;
}

.confirmBox{
display:none;
margin-top:20px;
padding:15px;
background:#101a31;
border-radius:14px;
}

.row{
display:flex;
gap:10px;
}

.cancelBtn{
background:#2a3554;
}

.confirmBtn{
background:#00a86b;
}

.footer{
margin-top:30px;
text-align:center;
font-size:12px;
color:#7080aa;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="title">
ArcPro Wallet
</div>

<div class="subtitle">
Universal Settlement Interface
</div>

<button onclick="connectWallet()">
Connect Wallet
</button>

<div class="wallet"
id="walletAddress">
Wallet Not Connected
</div>

<div class="network"
id="network">
Network: Disconnected
</div>

<div class="balanceBox">

<div class="balanceText">
Wallet Balance
</div>

<div class="balanceValue"
id="balance">
0.0000
</div>

</div>

</div>

<div class="card">

<h3>Send Transaction</h3>

<input
id="recipient"
placeholder="Recipient Address">

<input
id="amount"
placeholder="Amount In ETH">

<button onclick="prepareTransaction()">
Continue
</button>

<div class="confirmBox"
id="confirmBox">

<div id="confirmDetails"></div>

<div class="row">

<button
class="cancelBtn"
onclick="cancelTransaction()">
Cancel
</button>

<button
class="confirmBtn"
onclick="sendTransaction()">
Confirm
</button>

</div>

</div>

<div class="status"
id="status"></div>

</div>

<div class="footer">
Built For Arc Ecosystem
</div>

</div>

<script>

let provider;
let signer;
let userAddress;

async function connectWallet(){

try{

if(!window.ethereum){

alert("Install MetaMask Wallet");

return;

}

const accounts =
await window.ethereum.request({
method:"eth_requestAccounts"
});

provider =
new ethers.BrowserProvider(window.ethereum);

signer =
await provider.getSigner();

userAddress = accounts[0];

document.getElementById(
"walletAddress"
).innerHTML =
"Wallet: " +
userAddress.substring(0,8) +
"..." +
userAddress.slice(-6);

const network =
await provider.getNetwork();

document.getElementById(
"network"
).innerHTML =
"Network: " +
network.name;

loadBalance();

}catch(err){

console.log(err);

alert("Wallet Connection Failed");

}

}

async function loadBalance(){

try{

const balanceWei =
await provider.getBalance(userAddress);

const balanceEth =
ethers.formatEther(balanceWei);

document.getElementById(
"balance"
).innerHTML =
Number(balanceEth).toFixed(4) + " ETH";

}catch(err){

console.log(err);

document.getElementById(
"balance"
).innerHTML =
"Unavailable";

}

}

function prepareTransaction(){

const recipient =
document.getElementById(
"recipient"
).value.trim();

const amount =
document.getElementById(
"amount"
).value.trim();

if(!recipient || !amount){

alert("Fill All Fields");

return;

}

document.getElementById(
"confirmBox"
).style.display = "block";

document.getElementById(
"confirmDetails"
).innerHTML =
`
Send <b>${amount} ETH</b>
<br><br>
To:
<br>
${recipient}
`;

}

function cancelTransaction(){

document.getElementById(
"confirmBox"
).style.display = "none";

}

async function sendTransaction(){

try{

const recipient =
document.getElementById(
"recipient"
).value.trim();

const amount =
document.getElementById(
"amount"
).value.trim();

if(!ethers.isAddress(recipient)){

alert("Invalid Wallet Address");

return;

}

if(Number(amount) <= 0){

alert("Enter Valid Amount");

return;

}

document.getElementById(
"status"
).innerHTML =
"Opening Wallet Confirmation...";

const balance =
await provider.getBalance(userAddress);

const value =
ethers.parseEther(amount);

if(balance < value){

document.getElementById(
"status"
).innerHTML =
"Insufficient Balance";

return;

}

const tx =
await signer.sendTransaction({

to: recipient,

value: value

});

document.getElementById(
"status"
).innerHTML =
"Transaction Pending...";

await tx.wait();

document.getElementById(
"status"
).innerHTML =
"Transaction Successful";

document.getElementById(
"confirmBox"
).style.display = "none";

loadBalance();

}catch(err){

console.log(err);

document.getElementById(
"status"
).innerHTML =
err.reason ||
err.message ||
"Transaction Failed";

}

}

window.ethereum?.on(
"accountsChanged",
() => {
connectWallet();
}
);

window.ethereum?.on(
"chainChanged",
() => {
window.location.reload();
}
);

</script>

</body>
</html>
