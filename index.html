<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arc Pro | Multi-Asset Router</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        :root { --primary: #3b82f6; --bg: #05070a; --card: rgba(22, 30, 45, 0.7); --text: #f1f5f9; --accent: #10b981; --warn: #f59e0b; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding: 15px; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 450px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; }
        .card { background: var(--card); border-radius: 24px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .balance-hero { text-align: center; padding: 10px 0; }
        .balance-hero h1 { font-size: 3.2em; margin: 0; letter-spacing: -2px; }
        .addr-chip { background: rgba(16, 185, 129, 0.1); color: var(--accent); padding: 4px 12px; border-radius: 20px; font-size: 0.7em; font-family: monospace; border: 1px solid var(--accent); display: inline-block; margin-top: 8px; }
        .btn { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 16px; width: 100%; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 0.95em; }
        .btn:active { transform: scale(0.98); }
        .tab-bar { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .tab-btn { background: rgba(255,255,255,0.05); color: #94a3b8; border: none; padding: 10px; border-radius: 12px; font-size: 0.75em; cursor: pointer; }
        .tab-btn.active { background: var(--primary); color: white; }
        input { width: 100%; padding: 16px; margin: 8px 0; border-radius: 14px; border: 1px solid #2d3748; background: #000; color: #fff; box-sizing: border-box; font-size: 1em; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.8em; }
        .status-tag { font-size: 0.7em; padding: 2px 6px; border-radius: 4px; background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h2 style="margin:0; font-weight: 800; letter-spacing: -1px;">ARCFLOW <span style="color:var(--primary); font-weight: 300;">PRO</span></h2>
        <button class="btn" id="connectBtn" onclick="connectWallet()" style="width:auto; padding: 8px 16px; font-size: 0.8em;">Connect</button>
    </div>

    <div class="card">
        <div class="balance-hero">
            <div style="color: #94a3b8; font-size: 0.75em; text-transform: uppercase;">Total Liquidity</div>
            <h1 id="myBalance">0.0000</h1>
            <div id="walletAddr" class="addr-chip">Network Disconnected</div>
            <div style="margin-top:15px;"><button class="tab-btn" onclick="updateBalance()" style="padding: 5px 15px;">↻ Sync Engine</button></div>
        </div>
    </div>

    <div class="tab-bar">
        <button class="tab-btn active">Transfer</button>
        <button class="tab-btn" onclick="alert('Swap Engine Initializing...')">Swap</button>
        <button class="tab-btn" onclick="alert('Bridge Layer scanning...')">Bridge</button>
    </div>

    <div class="card">
        <h4 style="margin:0 0 10px 0; font-size: 0.8em; opacity: 0.6;">DETERMINISTIC SETTLEMENT</h4>
        <input type="text" id="toAddr" placeholder="Recipient (0x...)">
        <input type="number" id="sendAmt" placeholder="Amount (USDC)">
        <button class="btn" id="processBtn" onclick="sendTransaction()">Execute Settlement</button>
    </div>

    <div class="card">
        <h4 style="margin:0 0 12px 0; font-size: 0.8em; opacity: 0.5;">LEDGER ACTIVITY</h4>
        <div id="historyContainer" style="max-height: 200px; overflow-y: auto;">
            <div style="text-align:center; padding: 20px; opacity: 0.3; font-size: 0.8em;">No recent coordination detected</div>
        </div>
    </div>
</div>

<script>
let provider, signer, myAddress;

async function connectWallet() {
    if (window.ethereum) {
        try {
            provider = new ethers.BrowserProvider(window.ethereum);
            const accounts = await provider.send("eth_requestAccounts", []);
            signer = await provider.getSigner();
            myAddress = accounts[0];
            
            document.getElementById('connectBtn').innerText = "Linked";
            document.getElementById('walletAddr').innerText = `ID: ${myAddress.slice(0,6)}...${myAddress.slice(-4)}`;
            await updateBalance();
            loadHistory();
        } catch (e) { console.error(e); }
    } else { alert("Please install MetaMask"); }
}

async function updateBalance() {
    if (!myAddress) return;
    try {
        const balance = await provider.getBalance(myAddress);
        document.getElementById('myBalance').innerText = parseFloat(ethers.formatEther(balance)).toFixed(4);
    } catch (e) { console.error(e); }
}

async function sendTransaction() {
    const to = document.getElementById('toAddr').value;
    const amount = document.getElementById('sendAmt').value;
    const btn = document.getElementById('processBtn');

    if (!to || !amount) return alert("Missing Parameters");

    try {
        btn.disabled = true;
        btn.innerText = "Coordinating...";
        
        const tx = await signer.sendTransaction({
            to: to,
            value: ethers.parseEther(amount)
        });

        // Add temporary history entry
        addHistoryItem(tx.hash, amount, "Pending");
        
        await tx.wait();
        
        alert("Settlement Finalized");
        saveHistory(tx.hash, amount); // Persistent save
        await updateBalance();
        loadHistory(); 
    } catch (e) {
        alert("Settlement Aborted");
        console.error(e);
    } finally {
        btn.disabled = false;
        btn.innerText = "Execute Settlement";
    }
}

function addHistoryItem(hash, amt, status) {
    const container = document.getElementById('historyContainer');
    if (container.innerHTML.includes("No recent")) container.innerHTML = "";
    
    const html = `
        <div class="history-item">
            <div>
                <div style="font-weight:bold">Transfer</div>
                <div style="opacity:0.5; font-size:0.8em">${hash.slice(0,12)}...</div>
            </div>
            <div style="text-align:right">
                <div>${amt} ETH</div>
                <span class="status-tag">${status}</span>
            </div>
        </div>
    `;
    container.insertAdjacentHTML('afterbegin', html);
}

function saveHistory(hash, amt) {
    let history = JSON.parse(localStorage.getItem('arcHistory') || '[]');
    history.push({ hash, amt, time: new Date().toLocaleTimeString() });
    localStorage.setItem('arcHistory', JSON.stringify(history));
}

function loadHistory() {
    const container = document.getElementById('historyContainer');
    let history = JSON.parse(localStorage.getItem('arcHistory') || '[]');
    if (history.length > 0) {
        container.innerHTML = "";
        history.reverse().forEach(item => {
            addHistoryItem(item.hash, item.amt, "Confirmed");
        });
    }
}
</script>
</body>
</html>
