<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArcPro Wallet</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <style>
    body { font-family: system-ui; background:#0a0a0f; color:#fff; margin:0; padding:16px; }
    .card { background:#1a1a24; padding:20px; border-radius:16px; margin:16px 0; }
    button { background:#3b82f6; color:white; border:none; padding:16px; border-radius:12px; width:100%; font-size:16px; }
    input { width:100%; padding:16px; background:#222; border:none; border-radius:12px; color:white; margin:8px 0; }
  </style>
</head>
<body>
  <h2>ArcPro Wallet</h2>

  <div class="card">
    <strong>ARC TESTNET</strong><br>
    <span id="balance" style="font-size:28px;">0.00 USDC</span>
  </div>

  <div class="card">
    <strong>Send USDC</strong>
    <input type="text" id="to" placeholder="Recipient 0x...">
    <input type="number" id="amt" value="1" step="0.01">
    <button onclick="send()">Confirm Send</button>
  </div>

  <script>
    let signer, userAddress;
    const USDC = "0x3600000000000000000000000000000000000000";

    async function connect() {
      const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
      userAddress = accounts[0];
      signer = new ethers.providers.Web3Provider(window.ethereum).getSigner();
      document.getElementById("balance").innerText = "Connected";
    }

    async function send() {
      const to = document.getElementById("to").value;
      const amt = document.getElementById("amt").value;

      try {
        const contract = new ethers.Contract(USDC, ["function transfer(address,uint256)"], signer);
        const tx = await contract.transfer(to, ethers.utils.parseUnits(amt, 6));
        alert("Tx Sent! Hash: " + tx.hash);
      } catch(e) {
        alert("Error: " + e.message);
      }
    }

    connect();
  </script>
</body>
</html>
