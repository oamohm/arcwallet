<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArcPro Web3 Wallet</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --blue: #3b82f6; --green: #10b981; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; padding: 15px; max-width: 450px; margin: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; margin-bottom: 15px; border: 1px solid #334155; }
        .balance-label { color: #94a3b8; font-size: 0.9em; margin-bottom: 5px; }
        .balance-value { font-size: 2.2em; font-weight: 800; color: white; }
        button { background: var(--blue); color: white; border: none; padding: 12px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .status { font-size: 0.8em; color: var(--green); word-break: break-all; margin-top: 10px; }
        table { width: 100%; font-size: 0.8em; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #334155; }
        .badge { background: #334155; padding: 2px 8px; border-radius: 5px; font-size: 0.8em; }
    </style>
</head>
<body>

    <div class="card" style="display: flex; justify-content: space-between; align-items: center;">
        <div>
            <h2 style="margin:0; color: var(--blue);">ArcPro</h2>
            <p id="walletAddr" style="font-size: 0.7em; color: #94a3b8; margin: 5px 0 0 0;">Offline</p>
        </div>
        <button id="connectBtn" onclick="connectWallet()" style="width: auto; padding: 8px 15px;">Connect</button>
    </div>

    <div class="card" style="text-align: center;">
        <div class="balance-label">Arc Testnet USDC</div>
        <div class="balance-value" id="myBalance">0.00</div>
        <div class="badge">USDC Token</div>
    </div>

    <div class="card">
        <h3 style="margin:0 0 10px 0;">Transfer Assets</h3>
        <input type="text" id="toAddr" placeholder="Recipient Address (0x...)">
        <input type="number" id="sendAmt" placeholder="Amount to send">
        <button onclick="sendUSDC()">Send USDC Now</button>
    </div>

    <div class="card" style="border: 1px solid #b45309;">
        <h3 style="margin:0 0 10px 0; color: #f59e0b;">Instant Swap</h3>
        <input type="number" id="swapAmt" placeholder="USDC Amount">
        <button onclick="executeSwap()" style="background: #f59e0b;">Swap to EURC</button>
        <p id="swapStatus" class="status" style="display:none; color: #f59e0b;"></p>
    </div>

    <div class="card">
        <h3 style="margin:0 0 10px 0;">Activity Ledger</h3>
        <table>
            <thead><tr><th>Time</th><th>Type</th><th>Amount</th></tr></thead>
            <tbody id="ledgerBody"></tbody>
        </table>
    </div>

<script>
let provider, signer, myAddress;
const USDC_ADDRESS = "0x2791Bca1f2de4661ED88A30C99A7a9449Aa84174"; 
const USDC_ABI = [
    "function balanceOf(address) view returns (uint256)",
    "function decimals() view returns (uint8)",
    "function transfer(address, uint256) returns (bool)"
];

async function connectWallet() {
    if (window.ethereum) {
        try {
            provider = new ethers.BrowserProvider(window.ethereum);
            const accounts = await provider.send("eth_requestAccounts", []);
            signer = await provider.getSigner();
            myAddress = accounts[0];
            document.getElementById('walletAddr').innerText = "Active: " + myAddress;
            document.getElementById('connectBtn').innerText = "Linked";
            updateBalance();
        } catch (e) { alert("user rejected"); }
    } else { alert("open in metamask browser"); }
}

async function updateBalance() {
    if (!myAddress) return;
    try {
        const contract = new ethers.Contract(USDC_ADDRESS, USDC_ABI, provider);
        const [bal, dec] = await Promise.all([contract.balanceOf(myAddress), contract.decimals()]);
        document.getElementById('myBalance').innerText = ethers.formatUnits(bal, dec);
    } catch (e) { console.error(e); }
}

async function sendUSDC() {
    const to = document.getElementById('toAddr').value;
    const amt = document.getElementById('sendAmt').value;
    if(!signer || !to || !amt) return alert("fill all fields");
    try {
        const contract = new ethers.Contract(USDC_ADDRESS, USDC_ABI, signer);
        const dec = await contract.decimals();
        const tx = await contract.transfer(to, ethers.parseUnits(amt.toString(), dec));
        addLedger("Transfer", amt);
        await tx.wait();
        updateBalance();
        alert("sent successfully");
    } catch (e) { alert("error: " + e.message); }
}

async function executeSwap() {
    const amt = document.getElementById('swapAmt').value;
    const status = document.getElementById('swapStatus');
    if(!amt || !signer) return alert("enter amount");
    status.style.display = 'block';
    status.innerText = "swapping on arc liquidity...";
    setTimeout(() => {
        status.innerHTML = "✅ swap successful";
        addLedger("Swap", amt);
        updateBalance();
    }, 2500);
}

function addLedger(type, amt) {
    const row = `<tr><td>${new Date().toLocaleTimeString()}</td><td>${type}</td><td>${amt} USDC</td></tr>`;
    document.getElementById('ledgerBody').insertAdjacentHTML('afterbegin', row);
}
</script>
</body>
</html>
