<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ArcPro | Universal Router</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #3b82f6; --bg: #01040a; --s: #0f172a; --t: #ffffff; --glass: rgba(15, 23, 42, 0.8); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--t); font-family: 'Inter', sans-serif; display: flex; justify-content: center; height: 100vh; overflow: hidden; }

        .app-container { width: 100%; max-width: 430px; height: 100vh; display: flex; flex-direction: column; position: relative; background: radial-gradient(circle at 50% 0%, #1e293b 0%, #01040a 100%); }

        /* Header */
        .hdr { padding: 40px 25px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .logo { font-weight: 900; font-size: 1.4em; letter-spacing: -1px; background: linear-gradient(to right, #fff, #64748b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .node-tag { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); padding: 6px 12px; border-radius: 20px; font-size: 0.6em; font-weight: 800; display: flex; align-items: center; gap: 6px; }
        .pulse { width: 6px; height: 6px; background: #10b981; border-radius: 50%; box-shadow: 0 0 10px #10b981; animation: bl 2s infinite; }
        @keyframes bl { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* Balance Display (Exact Pawan Style) */
        .hero { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding-bottom: 50px; }
        .bal-wrap { text-align: center; }
        .bal-lbl { color: #64748b; font-size: 0.7em; font-weight: 700; letter-spacing: 2px; margin-bottom: 10px; }
        .bal-val { font-size: 4em; font-weight: 800; letter-spacing: -2px; }
        .sync-btn { margin-top: 15px; background: rgba(59, 130, 246, 0.1); color: var(--p); border: 1px solid rgba(59,130,246,0.2); padding: 8px 20px; border-radius: 12px; font-size: 0.65em; font-weight: 700; cursor: pointer; }

        /* Bottom Floating Panel */
        .sheet { background: var(--glass); border-top: 1px solid rgba(255,255,255,0.08); border-radius: 40px 40px 0 0; padding: 30px 25px 120px; backdrop-filter: blur(25px); position: relative; z-index: 5; box-shadow: 0 -20px 40px rgba(0,0,0,0.4); }
        .sheet-title { font-size: 0.85em; font-weight: 800; color: var(--p); margin-bottom: 25px; letter-spacing: 1px; display: flex; align-items: center; gap: 10px; }
        
        .input-group { background: #000; border: 1px solid rgba(255,255,255,0.05); padding: 18px; border-radius: 20px; margin-bottom: 12px; }
        .input-group label { display: block; font-size: 0.55em; color: #475569; font-weight: 800; margin-bottom: 6px; }
        input { background: transparent; border: none; color: #fff; width: 100%; outline: none; font-size: 1.1em; font-weight: 600; }
        
        .action-btn { background: var(--p); color: white; border: none; width: 100%; padding: 20px; border-radius: 22px; font-weight: 800; font-size: 1em; cursor: pointer; box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3); }

        /* Navigation (Fixed at Bottom) */
        .nav-bar { position: absolute; bottom: 30px; left: 20px; right: 20px; height: 80px; background: rgba(10, 15, 26, 0.95); border: 1px solid rgba(255,255,255,0.1); border-radius: 28px; display: flex; justify-content: space-around; align-items: center; z-index: 100; backdrop-filter: blur(10px); }
        .nav-link { color: #475569; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; transition: 0.3s; width: 25%; }
        .nav-link.active { color: var(--p); }
        .nav-link i { font-size: 1.3em; }
        .nav-link span { font-size: 0.55em; font-weight: 800; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="hdr">
        <div class="logo">ARC<span style="opacity:0.5; font-weight:300;">PRO</span></div>
        <div class="node-tag"><div class="pulse"></div> NODE SYNCHRONIZED</div>
    </div>

    <div class="hero">
        <div class="bal-wrap">
            <div class="bal-lbl">NET ASSET VOLUME</div>
            <div class="bal-val" id="mainBal">1.00</div>
            <button class="sync-btn" onclick="initNode()" id="nodeBtn">Initialize Connection</button>
        </div>
    </div>

    <div class="sheet">
        <div id="v-send">
            <div class="sheet-title"><i class="fas fa-paper-plane"></i> NATIVE SETTLEMENT</div>
            <div class="input-group"><label>RECIPIENT NODE</label><input type="text" placeholder="0x..." id="target"></div>
            <div class="input-group"><label>VOLUME (USDC)</label><input type="number" placeholder="0.00" id="amt"></div>
            <button class="action-btn" onclick="exec()">Process Route</button>
        </div>

        <div id="v-sec" class="hidden">
            <div class="sheet-title"><i class="fas fa-shield-halved"></i> SECURITY CONFIG</div>
            <div class="input-group" style="cursor:pointer" onclick="alert('Recovery Key: Alpha Bravo Charlie...')">
                <label>ENCRYPTED SEED</label>
                <div style="font-size:0.9em; font-weight:700; color:#fff;">Reveal Recovery Phrase</div>
            </div>
            <div class="input-group">
                <label>STATUS</label>
                <div style="font-size:0.9em; font-weight:700; color:var(--p);">Node Integrity Verified</div>
            </div>
        </div>

        <div id="v-swap" class="hidden">
            <div class="sheet-title"><i class="fas fa-shuffle"></i> LIQUIDITY SWAP</div>
            <div class="input-group"><label>FROM</label><input type="text" value="USDC (Arc)" disabled></div>
            <div class="input-group"><label>TO</label><input type="text" value="ETH (Base)" disabled></div>
            <button class="action-btn">Authorize Swap</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-link active" onclick="tab('send')"><i class="fas fa-bolt-lightning"></i><span>ROUTER</span></div>
        <div class="nav-link" onclick="tab('swap')"><i class="fas fa-repeat"></i><span>SWAP</span></div>
        <div class="nav-link" onclick="tab('security')"><i class="fas fa-lock"></i><span>SECURITY</span></div>
        <div class="nav-link" onclick="tab('config')"><i class="fas fa-sliders"></i><span>CONFIG</span></div>
    </div>
</div>

<script>
    let provider, account;
    const USDC = "0x2e1e07505F0376D41865A7E1C8A49c95d97F259B";
    const ABI = ["function balanceOf(address) view returns (uint256)"];

    async function initNode() {
        if (!window.ethereum) return alert("Install Metamask");
        provider = new ethers.BrowserProvider(window.ethereum);
        const accounts = await provider.send("eth_requestAccounts", []);
        account = accounts[0];
        document.getElementById('nodeBtn').innerText = account.slice(0,6)+'...'+account.slice(-4);
        syncBal();
    }

    async function syncBal() {
        try {
            const c = new ethers.Contract(USDC, ABI, provider);
            const b = await c.balanceOf(account);
            document.getElementById('mainBal').innerText = ethers.formatUnits(b, 6);
        } catch(e) { document.getElementById('mainBal').innerText = "1.00"; }
    }

    function tab(name) {
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        event.currentTarget.classList.add('active');
        
        document.getElementById('v-send').classList.add('hidden');
        document.getElementById('v-sec').classList.add('hidden');
        document.getElementById('v-swap').classList.add('hidden');

        if(name === 'send') document.getElementById('v-send').classList.remove('hidden');
        if(name === 'security') document.getElementById('v-sec').classList.remove('hidden');
        if(name === 'swap') document.getElementById('v-swap').classList.remove('hidden');
    }

    function exec() { alert("Initializing Settlement Route..."); }
    if(window.ethereum?.selectedAddress) initNode();
</script>
</body>
</html>
