<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arc Pro Wallet | Economic OS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        :root { --primary: #3b82f6; --bg: #05070a; --card: rgba(22, 30, 45, 0.7); --text: #f1f5f9; --accent: #10b981; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding: 15px; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 450px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 25px 0; width: 100%; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; width: 100%; box-sizing: border-box; }
        .balance-value { font-size: 3em; font-weight: 800; text-align: center; margin: 5px 0; color: #fff; }
        .addr-display { font-size: 0.7em; color: var(--accent); text-align: center; font-family: monospace; }
        .btn { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        input { width: 100%; padding: 14px; margin: 8px 0; border-radius: 10px; border: 1px solid #2d3748; background: #000; color: #fff; box-sizing: border-box; }
        .refresh-btn { background: transparent; color: #60a5fa; border: 1px solid #1e293b; padding: 5px 12px; border-radius: 20px; font-size: 0.7em; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h2 style="margin:0;">ARC <span style="color:var(--primary); font-weight: 300;">PRO</span></h2>
        <button class="btn" id="connectBtn" onclick="connectWallet()" style="width:auto; padding: 8px 15px;">Connect Core</button>
    </div>

    <div class="card" style="text-align: center;">
        <div style="color: #94a3b8; font-size: 0.8em;">ARC TESTNET LIQUIDITY</div>
        <div class="balance-value" id="myBalance">0.00</div>
        <div id="walletAddr" class="addr-display">Not Linked</div>
        <button class="refresh-btn" onclick="updateBalance()">↻ Sync Balance</button>
    </div>

    <div class="card">
        <h4 style="margin:0 0 10px 0; font-size: 0.8em; opacity: 0.7;">SETTLEMENT LAYER</h4>
        <input type="text" id="toAddr" placeholder="Recipient (0x...)">
        <input type="number" id="sendAmt" placeholder="Amount (USDC)">
        <button class="btn" id="processBtn" onclick="sendTransaction()">Execute Transfer</button>
    </div>

    <div class="card">
        <h4 style="margin:0 0 10px 0; font-size: 0.8em; opacity: 0.5;">DETERMINISTIC LEDGER</h4>
        <div id="ledger" style="font-size: 0.75em; color: #94a3b8;">No activity detected.</div>
    </div>
</div>

<script>
let provider, signer, myAddress;

async function connectWallet() {
    if (window.ethereum) {
        provider = new ethers.BrowserProvider(window.ethereum);
        const accounts = await provider.send("eth_requestAccounts", []);
        signer = await provider.getSigner();
        myAddress = accounts[0];
        
        document.getElementById('connectBtn').innerText = "Linked";
        document.getElementById('walletAddr').innerText = `ID: ${myAddress.slice(0,6)}...${myAddress.slice(-4)}`;
        await updateBalance();
    } else {
        alert("Please install MetaMask");
    }
}

async function updateBalance() {
    if (!myAddress) return;
    try {
        const balance = await provider.getBalance(myAddress);
        // Displaying Native balance (or you can map to USDC contract)
        document.getElementById('myBalance').innerText = parseFloat(ethers.formatEther(balance)).toFixed(4);
        console.log("Balance Refreshed");
    } catch (e) { console.error(e); }
}

async function sendTransaction() {
    const to = document.getElementById('toAddr').value;
    const amount = document.getElementById('sendAmt').value;
    const btn = document.getElementById('processBtn');

    if (!to || !amount) return alert("Details bhariye");

    try {
        btn.disabled = true;
        btn.innerText = "Processing...";
        
        const tx = await signer.sendTransaction({
            to: to,
            value: ethers.parseEther(amount)
        });

        document.getElementById('ledger').innerText = "Pending: " + tx.hash.slice(0,20) + "...";
        
        await tx.wait(); // Transaction confirmation ka wait karega
        
        document.getElementById('ledger').innerText = "Success: " + tx.hash.slice(0,20) + "...";
        alert("Transfer Successful");
        await updateBalance(); // Auto refresh balance
    } catch (e) {
        alert("Transaction Failed");
        console.error(e);
    } finally {
        btn.disabled = false;
        btn.innerText = "Execute Transfer";
    }
}
</script>
</body>
</html>
