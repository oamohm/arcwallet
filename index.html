<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ArcPro Wallet</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#050816;
color:white;
}

.container{
max-width:480px;
margin:auto;
padding:20px;
}

.card{
background:#0d1324;
padding:20px;
border-radius:20px;
margin-top:20px;
border:1px solid #1f2d52;
}

.logo{
font-size:32px;
font-weight:bold;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:16px;
background:#3154ff;
color:white;
font-size:16px;
margin-top:14px;
cursor:pointer;
}

input{
width:100%;
padding:16px;
border:none;
border-radius:16px;
background:#151d33;
color:white;
margin-top:12px;
font-size:15px;
box-sizing:border-box;
}

.balance{
font-size:40px;
font-weight:bold;
margin-top:8px;
}

.small{
font-size:13px;
color:#8ea2ff;
margin-top:10px;
word-break:break-word;
}

.status{
margin-top:15px;
font-size:14px;
color:#8ea2ff;
}

.tx{
background:#151d33;
padding:14px;
border-radius:14px;
margin-top:12px;
font-size:14px;
}

.success{
color:#22c55e;
}

.failed{
color:#ef4444;
}

.pending{
color:#facc15;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
ArcPro
</div>

<div class="card">

<div style="display:flex;justify-content:space-between;align-items:center;">

<div>

<div style="font-size:13px;color:#8ea2ff;">
ARC TESTNET
</div>

<div
class="balance"
id="balanceDisplay">
0.00 USDC
</div>

</div>

<div id="networkStatus">
Disconnected
</div>

</div>

<div
class="small"
id="walletAddress">
Wallet not connected
</div>

<button onclick="connectWallet()">
Connect Wallet
</button>

</div>

<div class="card">

<h3>
Send USDC
</h3>

<input
id="recipient"
placeholder="Recipient Address">

<input
id="amount"
type="number"
placeholder="Amount">

<button onclick="sendUSDC()">
Confirm Send
</button>

<div
class="status"
id="status">
Waiting for wallet connection
</div>

</div>

<div class="card">

<h3>
Recent Transactions
</h3>

<div id="txHistory"></div>

</div>

</div>

<script>

let provider;
let signer;
let userAddress;

/*
TEMP DEMO CONTRACT

Real Arc USDC contract milne ke baad
yahan replace karna
*/

const USDC_ADDRESS =
"0xaf88d065e77c8cc2239327c5edb3a432268e5831";

const USDC_ABI = [

"function balanceOf(address owner) view returns (uint256)",

"function transfer(address to,uint amount) returns (bool)",

"function decimals() view returns (uint8)"

];

async function connectWallet(){

try{

if(!window.ethereum){

alert("Install MetaMask or Brave");

return;

}

await ethereum.request({
method:"eth_requestAccounts"
});

provider =
new ethers.providers.Web3Provider(
window.ethereum
);

signer =
provider.getSigner();

userAddress =
await signer.getAddress();

document.getElementById(
"walletAddress"
).innerHTML =
userAddress;

document.getElementById(
"networkStatus"
).innerHTML =
"Connected";

loadBalance();

}catch(err){

console.log(err);

alert("Wallet Connection Failed");

}

}

async function loadBalance(){

try{

/*
SAFE FALLBACK
*/

const balanceWei =
await provider.getBalance(
userAddress
);

const balance =
ethers.utils.formatEther(
balanceWei
);

document.getElementById(
"balanceDisplay"
).innerHTML =
Number(balance).toFixed(4) +
" ETH";

}catch(err){

console.log(err);

document.getElementById(
"balanceDisplay"
).innerHTML =
"0.00";

}

}

async function sendUSDC(){

try{

const recipient =
document.getElementById(
"recipient"
).value.trim();

const amount =
document.getElementById(
"amount"
).value.trim();

if(!ethers.utils.isAddress(recipient)){

alert("Invalid Address");

return;

}

if(Number(amount) <= 0){

alert("Invalid Amount");

return;

}

document.getElementById(
"status"
).innerHTML =
"Waiting for confirmation...";

const tx =
await signer.sendTransaction({

to: recipient,

value:
ethers.utils.parseEther(amount)

});

document.getElementById(
"status"
).innerHTML =
"Transaction Pending...";

addTransaction(
amount,
recipient,
"pending",
tx.hash
);

await tx.wait();

document.getElementById(
"status"
).innerHTML =
"Transaction Successful";

addTransaction(
amount,
recipient,
"success",
tx.hash
);

loadBalance();

}catch(err){

console.log(err);

document.getElementById(
"status"
).innerHTML =
"Transaction Failed";

addTransaction(
"0",
"",
"failed",
""
);

}

}

function addTransaction(
amount,
recipient,
status,
hash
){

const div =
document.createElement("div");

div.className = "tx";

if(status === "success"){

div.innerHTML =
`
<div class="success">
✓ ${amount} ETH Sent
</div>

<div style="margin-top:6px;">
${recipient.slice(0,10)}...
</div>
`;

}else if(status === "pending"){

div.innerHTML =
`
<div class="pending">
⏳ Pending Transaction
</div>
`;

}else{

div.innerHTML =
`
<div class="failed">
✕ Transaction Failed
</div>
`;

}

document.getElementById(
"txHistory"
).prepend(div);

}

</script>

</body>
</html>
