<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arc Pro Wallet</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        :root { --primary: #3b82f6; --bg: #050816; --card: #0d1324; --text: #f1f5f9; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .app { width: 100%; max-width: 440px; padding: 20px; }
        .card { background: var(--card); border-radius: 24px; padding: 24px; border: 1px solid #1f2d52; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .btn-connect { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 14px; font-weight: 700; cursor: pointer; }
        .balance-val { font-size: 3.2rem; font-weight: 800; text-align: center; margin: 10px 0; }
        .label { color: #8ea2ff; font-size: 0.8rem; text-align: center; text-transform: uppercase; letter-spacing: 1px; }
        input { width: 100%; padding: 16px; margin: 10px 0; border-radius: 16px; border: 1px solid #1f2d52; background: #050816; color: white; outline: none; box-sizing: border-box; }
        .btn-send { background: #3154ff; color: white; border: none; padding: 16px; border-radius: 16px; width: 100%; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .status { text-align: center; font-size: 0.8rem; margin-top: 15px; color: #22c55e; word-break: break-all; }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <h2 style="margin:0; font-style: italic;">ArcPro</h2>
        <button class="btn-connect" id="cnBtn" onclick="connect()">Connect</button>
    </div>

    <div class="card">
        <div class="label">Arc Testnet Assets</div>
        <div class="balance-val" id="balText">335.05</div>
        <div style="text-align:center; margin-bottom: 10px;"><span style="background:#1e293b; padding:4px 12px; border-radius:8px; font-size:0.7rem; color:var(--primary)">NATIVE USDC</span></div>
        <div class="label" style="font-size: 0.7rem;">Gas Balance (ARC): <span id="gasText" style="color:#fff;">335.0460 ARC</span></div>
        <div class="status" id="addrText" style="color:#94a3b8">Linked: 0x...</div>
    </div>

    <div class="card">
        <h4 style="margin:0 0 10px 0">Transfer Assets</h4>
        <input type="text" id="to" placeholder="Recipient Address (0x...)">
        <input type="number" id="amt" placeholder="Amount (USDC)">
        <button class="btn-send" onclick="send()">Process Transfer</button>
        <div id="stText" class="status" style="color: #ef4444;"></div>
    </div>
</div>

<script>
let p, s, addr;
const USDC = "0x3600000000000000000000000000000000000000"; // native usdc contract
const ABI = ["function balanceOf(address) view returns (uint256)", "function decimals() view returns (uint8)"];

async function connect() {
    if (!window.ethereum) return alert("Brave ya MetaMask open karein");
    p = new ethers.BrowserProvider(window.ethereum);
    const accs = await p.send("eth_requestAccounts", []);
    s = await p.getSigner();
    addr = accs[0];
    document.getElementById('cnBtn').innerText = "Connected";
    document.getElementById('addrText').innerText = "Linked: " + addr.slice(0,6) + "..." + addr.slice(-4);
    await getBal();
}

async function getBal() {
    try {
        const c = new ethers.Contract(USDC, ABI, p);
        const [b, d, gasBal] = await Promise.all([
            c.balanceOf(addr), 
            c.decimals(),
            p.getBalance(addr)
        ]);
        document.getElementById('balText').innerText = parseFloat(ethers.formatUnits(b, d)).toFixed(2);
        document.getElementById('gasText').innerText = parseFloat(ethers.formatEther(gasBal)).toFixed(4) + " ARC";
    } catch (e) { console.error(e); }
}

async function send() {
    const target = document.getElementById('to').value;
    const val = document.getElementById('amt').value;
    if (!window.ethereum || !addr || !target || !val) return alert("Details bhariye aur wallet connect karein");
    
    try {
        const stDisplay = document.getElementById('stText');
        stDisplay.style.color = "#3b82f6";
        stDisplay.innerText = "Opening Brave Wallet Sign Window...";

        // Step 1: Manual Method encoding to completely bypass node validation checks
        const cleanAddr = target.toLowerCase().replace("0x", "").padStart(64, "0");
        
        // Arc Native USDC uses standard 18 decimal padding
        const hexAmount = BigInt(ethers.parseUnits(val.toString(), 18)).toString(16).padStart(64, "0");
        
        // Standard ERC20 transfer signature selector prefix
        const txData = "0xa905cbb0" + cleanAddr + hexAmount;

        // Step 2: Use direct low-level RPC routing so the extension handles node issues itself
        const txHash = await window.ethereum.request({
            method: 'eth_sendTransaction',
            params: [{
                from: addr,
                to: USDC,
                data: txData,
                gas: '0x249f0' // 150,000 gas units overhead
            }],
        });

        stDisplay.style.color = "#22c55e";
        stDisplay.innerText = "Tx Hash Generated: " + txHash.slice(0,10) + "...";
        
        // Smooth local balance prediction update
        setTimeout(() => { getBal(); }, 4000);
    } catch (e) { 
        console.error(e);
        document.getElementById('stText').style.color = "#ef4444";
        document.getElementById('stText').innerText = "Brave Wallet ne transaction accept nahi ki ya reject kar di.";
    }
}

window.addEventListener('load', () => { if(window.ethereum) connect(); });
</script>
</body>
</html>
