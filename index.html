<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arc Pro Wallet | Economic OS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        :root { --primary: #3b82f6; --bg: #05070a; --card: rgba(22, 30, 45, 0.7); --text: #f1f5f9; --accent: #10b981; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding: 15px; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 450px; backdrop-filter: blur(10px); }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 30px 0; }
        .card { background: var(--card); border-radius: 24px; padding: 24px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .balance-value { font-size: 3.5em; font-weight: 800; text-align: center; margin: 5px 0; letter-spacing: -2px; background: linear-gradient(to bottom, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 16px; width: 100%; font-weight: 700; cursor: pointer; transition: 0.3s; }
        input, textarea { width: 100%; padding: 16px; margin: 12px 0; border-radius: 14px; border: 1px solid #2d3748; background: rgba(0,0,0,0.3); color: white; box-sizing: border-box; outline: none; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .link-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 12px; text-align: center; text-decoration: none; color: #94a3b8; font-size: 0.75em; }
        .activity-table { width: 100%; font-size: 0.8em; border-collapse: collapse; }
        .activity-table td { padding: 14px 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .settlement-badge { font-size: 0.7em; padding: 2px 8px; border-radius: 4px; background: rgba(16, 185, 129, 0.1); color: var(--accent); border: 1px solid var(--accent); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h2 style="margin:0; font-weight: 900; letter-spacing: -1px;">ARC <span style="color:var(--primary); font-weight: 300;">PRO</span></h2>
        <button class="btn" id="connectBtn" onclick="connectWallet()" style="width:auto; padding: 10px 20px;">Connect Core</button>
    </div>

    <div class="card">
        <div style="color: #94a3b8; font-size: 0.8em; text-align: center;">ARC TESTNET LIQUIDITY</div>
        <div class="balance-value" id="myBalance">360.05</div>
        <div style="text-align:center;"><span style="background: #1e293b; padding: 4px 12px; border-radius: 20px; font-size: 0.7em; color: #60a5fa;">NATIVE USDC</span></div>
    </div>

    <div class="card">
        <h4 style="margin:0 0 15px 0; font-size: 0.9em; opacity: 0.8;">AGENT COORDINATION LAYER</h4>
        <input type="text" id="toAddr" placeholder="Agent Address (0x...)" oninput="checkAgent()">
        <div id="verifyInfo" style="font-size: 0.7em; color: #94a3b8; margin-bottom: 10px;">Scanning Network...</div>
        <input type="number" id="sendAmt" placeholder="Amount (USDC)">
        <button class="btn" id="processBtn" onclick="sendUSDC()">Execute Settlement</button>
    </div>

    <div class="card">
        <h4 style="margin:0 0 10px 0; font-size: 0.8em; opacity: 0.5;">DETERMINISTIC LEDGER</h4>
        <table class="activity-table">
            <tbody id="ledgerBody">
                <tr><td colspan="3" style="text-align:center; padding: 20px; opacity: 0.3;">No recent coordination</td></tr>
            </tbody>
        </table>
    </div>

    <div style="font-size: 0.7em; color: #4b5563; margin: 20px 0 10px 5px; text-transform: uppercase;">Arc Resources</div>
    <div class="grid-container">
        <a href="https://house.arc.network" target="_blank" class="link-card">Explore House</a>
        <a href="https://docs.arc.network" target="_blank" class="link-card">Network Docs</a>
        <a href="https://developers.circle.com" target="_blank" class="link-card">Circle Devs</a>
        <a href="https://faucet.circle.com" target="_blank" class="link-card">USDC Faucet</a>
    </div>

    <div class="card" style="margin-top: 20px; border-style: dashed; opacity: 0.8;">
        <h4 style="margin:0 0 10px 0; font-size: 0.8em;">Builder Feedback</h4>
        <textarea placeholder="Suggest a realization..." rows="3"></textarea>
        <button class="btn" style="padding:10px; font-size:0.8em;">Submit Signal</button>
    </div>
</div>

<script>
let provider, signer, myAddress;

async function connectWallet() {
    if (window.ethereum) {
        provider = new ethers.BrowserProvider(window.ethereum);
        const accounts = await provider.send("eth_requestAccounts", []);
        signer = await provider.getSigner();
        myAddress = accounts[0];
        document.getElementById('connectBtn').innerText = "Core Linked";
    }
}

function checkAgent() {
    const addr = document.getElementById('toAddr').value;
    const info = document.getElementById('verifyInfo');
    if(addr.length > 10) info.innerHTML = "<span style='color:#10b981'>● Verified Path Detected</span>";
}

async function sendUSDC() {
    const btn = document.getElementById('processBtn');
    const amt = document.getElementById('sendAmt').value;
    if(!amt) return;
    btn.innerText = "Settling...";
    setTimeout(() => {
        addLedger("Transfer", amt);
        btn.innerText = "Execute Settlement";
        alert("Settlement Finalized");
    }, 2000);
}

function addLedger(type, amt) {
    const ledger = document.getElementById('ledgerBody');
    if(ledger.innerHTML.includes("No recent")) ledger.innerHTML = "";
    const row = `<tr><td>${new Date().toLocaleTimeString()}</td><td><b>${type}</b> <span class="settlement-badge">DETERMINISTIC</span></td><td style="text-align:right">${amt} USDC</td></tr>`;
    ledger.insertAdjacentHTML('afterbegin', row);
}
</script>
</body>
</html>
