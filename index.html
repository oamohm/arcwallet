<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArcPro • Universal Wallet</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Inter', sans-serif; background:#0a0a0f; color:#e0e0ff; }
    .container { max-width:480px; margin:0 auto; background:#111118; min-height:100vh; }
    header { padding:16px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #22222f; }
    .logo { font-size:22px; font-weight:600; }
    .card { background:#1a1a24; margin:16px; border-radius:16px; padding:20px; }
    button { background:#3b82f6; color:white; border:none; padding:14px; border-radius:12px; width:100%; font-weight:600; cursor:pointer; font-size:16px; }
    button:disabled { background:#334155; }
    input, select { width:100%; background:#22222f; border:none; padding:14px; border-radius:12px; color:white; margin:8px 0; font-size:16px; }
    .quick { display:flex; gap:8px; margin:12px 0; }
    .quick button { background:#22222f; flex:1; padding:12px; border-radius:12px; font-size:15px; }
    .status { color:#eab308; }
    .connected { color:#22c55e !important; }
    .balance { font-size:28px; font-weight:600; margin:8px 0; }
    .tx { font-size:13px; padding:12px; background:#22222f; border-radius:8px; margin:8px 0; word-break:break-all; }
    #musicToggle { position:fixed; bottom:20px; right:20px; background:#222; padding:10px 14px; border-radius:50%; cursor:pointer; z-index:100; font-size:20px; }
  </style>
</head>
<body>
  <div class="container">

    <header>
      <div class="logo">ArcPro</div>
      <button onclick="connectWallet()" id="connectBtn">Connect</button>
    </header>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div>
          <strong>ARC TESTNET</strong><br>
          <span id="balanceDisplay" class="balance">0.00 USDC</span>
        </div>
        <span id="status" class="status">Idle</span>
      </div>
    </div>

    <!-- SEND ASSET -->
    <div class="card">
      <strong style="display:flex;align-items:center;gap:8px;">↗ SEND ASSET</strong>
      
      <select id="asset">
        <option>USDC (Stablecoin)</option>
      </select>

      <input type="text" id="recipient" placeholder="Recipient address (0x...)" />

      <div>Quick Amount:</div>
      <div class="quick">
        <button onclick="setAmount(10)">10</button>
        <button onclick="setAmount(50)">50</button>
        <button onclick="setAmount(100)">100</button>
      </div>

      <input type="number" id="amount" value="0.00" step="0.01" />

      <button onclick="sendUSDC()">Confirm Send</button>
    </div>

    <!-- Transaction History (Real-time) -->
    <div class="card">
      <strong>Recent Transactions</strong>
      <div id="txHistory" style="margin-top:12px; max-height:320px; overflow-y:auto;"></div>
    </div>

    <!-- Ecosystem -->
    <div class="card">
      <strong>ECOSYSTEM & SOCIALS</strong>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px;">
        <div onclick="window.open('https://arc.network')" style="background:#22222f;padding:12px;border-radius:12px;text-align:center;cursor:pointer;">Website</div>
        <div onclick="window.open('https://docs.arc.network')" style="background:#22222f;padding:12px;border-radius:12px;text-align:center;cursor:pointer;">Docs</div>
        <div onclick="window.open('https://arc.network/house')" style="background:#22222f;padding:12px;border-radius:12px;text-align:center;cursor:pointer;">House</div>
        <div onclick="window.open('https://x.com/Bhupendrxsingh')" style="background:#22222f;padding:12px;border-radius:12px;text-align:center;cursor:pointer;">X</div>
        <div onclick="window.open('https://discord.gg/arcnetwork')" style="background:#22222f;padding:12px;border-radius:12px;text-align:center;cursor:pointer;">Discord</div>
      </div>
    </div>

    <div style="text-align:center;padding:20px;color:#666;font-size:13px;">
      Built for Arc Network • Testnet
    </div>
  </div>

  <!-- Music -->
  <div id="musicToggle" onclick="toggleMusic()">♪</div>
  <audio id="bgMusic" loop>
    <source src="https://assets.mixkit.co/sfx/preview/123/123.wav" type="audio/wav">
  </audio>

  <script>
    let provider, signer, userAddress;
    let txHistory = [];

    const ARC_TESTNET = {
      chainId: "0x4cef52",
      chainName: "Arc Testnet",
      nativeCurrency: { name: "USDC", symbol: "USDC", decimals: 18 }, // Important fix
      rpcUrls: ["https://rpc.testnet.arc.network"],
      blockExplorerUrls: ["https://testnet.arcscan.app"]
    };

    async function connectWallet() {
      const btn = document.getElementById("connectBtn");
      btn.disabled = true; btn.innerText = "Connecting...";

      try {
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        userAddress = accounts[0];
        provider = new ethers.providers.Web3Provider(window.ethereum);
        signer = provider.getSigner();

        // Network switch
        const currentChain = await window.ethereum.request({ method: 'eth_chainId' });
        if (currentChain !== ARC_TESTNET.chainId) {
          try { await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: ARC_TESTNET.chainId }]}); }
          catch (e) { if (e.code === 4902) await window.ethereum.request({ method: 'wallet_addEthereumChain', params: [ARC_TESTNET] }); }
        }

        btn.innerText = userAddress.slice(0,6) + "..." + userAddress.slice(-4);
        btn.style.backgroundColor = "#22c55e";
        document.getElementById("status").innerText = "Connected";
        document.getElementById("status").classList.add("connected");

        getBalance();
        addTxToHistory("Connected", "0", userAddress);
      } catch (error) {
        alert("Connect failed: " + error.message);
        resetBtn();
      }
    }

    function resetBtn() {
      const btn = document.getElementById("connectBtn");
      btn.disabled = false; btn.innerText = "Connect"; btn.style.backgroundColor = "";
    }

    async function getBalance() {
      if (!provider || !userAddress) return;
      try {
        const bal = await provider.getBalance(userAddress);
        const usdcBal = (parseFloat(bal) / 1e18).toFixed(4); // 18 decimals
        document.getElementById("balanceDisplay").innerText = usdcBal + " USDC";
      } catch(e) {}
    }

    function setAmount(val) { document.getElementById("amount").value = val; }

    async function sendUSDC() {
      if (!signer) { alert("Pehle Connect karo"); return; }
      const to = document.getElementById("recipient").value.trim();
      const amtStr = document.getElementById("amount").value;

      if (!ethers.utils.isAddress(to)) { alert("Sahih address daalo"); return; }
      if (parseFloat(amtStr) <= 0) { alert("Amount daalo"); return; }

      try {
        const tx = await signer.sendTransaction({
          to: to,
          value: ethers.utils.parseUnits(amtStr, 18)   // Fixed: 18 decimals
        });

        addTxToHistory(tx.hash, amtStr, to);
        alert(`✅ Transaction Successful!\nHash: ${tx.hash}\n\nCheck on Explorer →`);
        
        setTimeout(getBalance, 4000); // Real-time balance update
      } catch (e) {
        alert("Send failed: " + (e.message || "Try again after some time"));
      }
    }

    function addTxToHistory(hash, amount, to) {
      const tx = {
        hash: hash.length > 20 ? hash.slice(0,10) + "..." : hash,
        amount: amount,
        to: to.slice(0,8) + "...",
        time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
      };
      txHistory.unshift(tx);
      if (txHistory.length > 6) txHistory.pop();
      renderTxHistory();
    }

    function renderTxHistory() {
      const container = document.getElementById("txHistory");
      container.innerHTML = txHistory.map(tx => `
        <div class="tx">
          <div><strong>${tx.time}</strong> • ${tx.amount} USDC</div>
          <div style="color:#888;">→ ${tx.to}</div>
          ${tx.hash.startsWith('0x') ? `<a href="https://testnet.arcscan.app/tx/${tx.hash}" target="_blank" style="color:#60a5fa;font-size:12px;">View on Explorer</a>` : ''}
        </div>
      `).join('');
    }

    function toggleMusic() {
      const audio = document.getElementById("bgMusic");
      if (audio.paused) { audio.play(); document.getElementById("musicToggle").innerText = "⏸"; }
      else { audio.pause(); document.getElementById("musicToggle").innerText = "♪"; }
    }

    window.ethereum?.on('accountsChanged', () => window.location.reload());
    window.ethereum?.on('chainChanged', () => window.location.reload());
  </script>
</body>
</html>
