<script>

let provider;
let signer;
let userAddress;

const chainId = "0x66eee";

const usdcAddress = "0x75faf114eafb1BDbe2F0316DF893fd58CE46AA4d";

const usdcABI = [
  "function balanceOf(address owner) view returns (uint256)",
  "function transfer(address to,uint amount) returns (bool)",
  "function decimals() view returns (uint8)"
];

async function connectWallet(){

  try{

    if(!window.ethereum){
      alert("Install MetaMask");
      return;
    }

    await window.ethereum.request({
      method:"wallet_switchEthereumChain",
      params:[{ chainId }]
    });

  }catch(switchError){

    console.log("network switch failed");
  }

  try{

    const accounts = await window.ethereum.request({
      method:"eth_requestAccounts"
    });

    provider = new ethers.BrowserProvider(window.ethereum);

    signer = await provider.getSigner();

    userAddress = accounts[0];

    document.getElementById("walletAddress").innerHTML =
      userAddress.slice(0,6) + "..." + userAddress.slice(-4);

    const network = await provider.getNetwork();

    document.querySelector(".network").innerHTML =
      "Connected: " + network.name;

    await loadBalance();

  }catch(err){

    console.log(err);

    alert("wallet connection failed");

  }

}

async function loadBalance(){

  try{

    const contract = new ethers.Contract(
      usdcAddress,
      usdcABI,
      provider
    );

    const decimals = await contract.decimals();

    const balance = await contract.balanceOf(userAddress);

    const formatted =
      ethers.formatUnits(balance, decimals);

    document.getElementById("balance").innerHTML =
      "Balance: " + Number(formatted).toFixed(2) + " USDC";

  }catch(err){

    console.log(err);

    document.getElementById("balance").innerHTML =
      "Balance unavailable";

  }

}

async function sendUSDC(){

  try{

    const recipient =
      document.getElementById("recipient").value;

    const amount =
      document.getElementById("amount").value;

    document.getElementById("status").innerHTML =
      "Preparing transaction...";

    const contract = new ethers.Contract(
      usdcAddress,
      usdcABI,
      signer
    );

    const tx = await contract.transfer(
      recipient,
      ethers.parseUnits(amount,6)
    );

    document.getElementById("status").innerHTML =
      "Transaction pending...";

    await tx.wait();

    document.getElementById("status").innerHTML =
      "Transfer successful";

    await loadBalance();

  }catch(err){

    console.log(err);

    document.getElementById("status").innerHTML =
      "Transfer failed";

  }

}

window.ethereum?.on("accountsChanged", connectWallet);

window.ethereum?.on("chainChanged", () => {
  window.location.reload();
});

</script>
