<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ArcPro Wallet</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.1/dist/ethers.umd.min.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#050816;
    color:white;
}

.container{
    max-width:420px;
    margin:auto;
    padding:20px;
}

.card{
    background:#0c1224;
    border:1px solid #1e2a52;
    border-radius:20px;
    padding:20px;
    margin-top:20px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#3154ff;
    color:white;
    font-size:16px;
    cursor:pointer;
}

input{
    width:100%;
    padding:14px;
    margin-top:10px;
    background:#09101f;
    border:1px solid #1c2b52;
    border-radius:12px;
    color:white;
    box-sizing:border-box;
}

.balance{
    color:#00ff95;
    font-size:18px;
    margin-top:10px;
}

.title{
    font-size:28px;
    font-weight:bold;
}

.network{
    color:#8ca0ff;
    margin-top:8px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<div class="title">ArcPro Wallet</div>
<div class="network">Arbitrum Sepolia</div>

<button onclick="connectWallet()">Connect Wallet</button>

<div id="walletAddress" style="margin-top:15px;"></div>

<div class="balance" id="balance">
Balance: 0 USDC
</div>
</div>

<div class="card">

<h3>Send USDC</h3>

<input id="recipient" placeholder="Recipient Address">

<input id="amount" placeholder="Amount">

<button onclick="sendUSDC()" style="margin-top:15px;">
Confirm Send
</button>

<div id="status" style="margin-top:15px;"></div>

</div>

</div>

<script>

let provider;
let signer;
let userAddress;

const usdcAddress = "0x75faf114eafb1BDbe2F0316DF893fd58CE46AA4d";

const usdcABI = [
    "function balanceOf(address owner) view returns (uint256)",
    "function transfer(address to, uint amount) returns (bool)",
    "function decimals() view returns (uint8)"
];

async function connectWallet(){

    if(!window.ethereum){
        alert("MetaMask not found");
        return;
    }

    await window.ethereum.request({
        method:"eth_requestAccounts"
    });

    provider = new ethers.BrowserProvider(window.ethereum);

    signer = await provider.getSigner();

    userAddress = await signer.getAddress();

    document.getElementById("walletAddress").innerHTML =
        "Wallet: " + userAddress;

    loadBalance();
}

async function loadBalance(){

    const contract = new ethers.Contract(
        usdcAddress,
        usdcABI,
        provider
    );

    const balance = await contract.balanceOf(userAddress);

    const formatted = ethers.formatUnits(balance,6);

    document.getElementById("balance").innerHTML =
        "Balance: " + formatted + " USDC";
}

async function sendUSDC(){

    try{

        const recipient =
            document.getElementById("recipient").value;

        const amount =
            document.getElementById("amount").value;

        const contract = new ethers.Contract(
            usdcAddress,
            usdcABI,
            signer
        );

        const tx = await contract.transfer(
            recipient,
            ethers.parseUnits(amount,6)
        );

        document.getElementById("status").innerHTML =
            "Transaction Pending...";

        await tx.wait();

        document.getElementById("status").innerHTML =
            "Transfer Successful";

        loadBalance();

    }catch(err){

        console.log(err);

        document.getElementById("status").innerHTML =
            "Transaction Failed";

    }
}

</script>

</body>
</html>
