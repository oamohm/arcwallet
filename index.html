<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arc Pro Wallet - Real Time</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { --primary: #0052FF; --bg: #0b0e11; --card: #181a20; --text: #eaecef; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 15px; }
        .container { max-width: 480px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px; }
        .logo-img { width: 45px; height: 45px; object-fit: contain; }
        .wallet-card { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid #303339; margin-bottom: 20px; }
        .balance-label { color: #848e9c; font-size: 14px; }
        .balance-amount { font-size: 32px; font-weight: bold; margin: 10px 0; }
        input { width: 100%; padding: 12px; background: #2b2f36; border: 1px solid #474d57; border-radius: 8px; color: white; box-sizing: border-box; margin-bottom: 12px; }
        .btn-main { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-secondary { background: #2b3139; color: white; margin-top: 10px; }
        .ledger-section { background: var(--card); border-radius: 16px; padding: 15px; margin-top: 20px; }
        .tx-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #2b3139; font-size: 13px; }
        .tx-id { color: var(--primary); text-decoration: none; font-family: monospace; }
        .status-success { color: #0ecb81; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="logo.png" alt="Arc" class="logo-img" onerror="this.src='https://arc.network/favicon.ico'">
        <button id="connectBtn" class="btn-main" style="width: auto; padding: 8px 15px;">Connect Wallet</button>
    </div>

    <div class="wallet-card">
        <div class="balance-label">Main Account Balance</div>
        <div class="balance-amount" id="userBalance">0.00 <span style="font-size: 16px;">USDC</span></div>
        <div id="walletAddress" style="font-size: 11px; color: #848e9c; margin-bottom: 15px;">Not Connected</div>
        
        <input type="text" id="toAddress" placeholder="Recipient Address (0x...)">
        <input type="number" id="sendAmount" placeholder="Amount ($USDC$)">
        <button class="btn-main" onclick="sendTransaction()">Send Funds</button>
    </div>

    <div class="ledger-section">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h4 style="margin: 0;">Recent Transactions</h4>
            <div style="display: flex; gap: 5px;">
                <button onclick="exportData('pdf')" style="font-size: 10px; cursor: pointer;">PDF</button>
                <button onclick="exportData('xlsx')" style="font-size: 10px; cursor: pointer;">Excel</button>
            </div>
        </div>
        <div id="txHistory">
            </div>
    </div>
</div>

<script>
    let provider, signer, address;
    const USDC_CONTRACT = "0x2791Bca1f2de4661ED88A30C99A7a9449Aa84174"; // Example Arc USDC, replace with actual from docs

    // Voice setup
    const speak = (msg) => {
        const speech = new SpeechSynthesisUtterance(msg);
        speech.lang = 'hi-IN';
        window.speechSynthesis.speak(speech);
    };

    // Connect Wallet Real-time
    document.getElementById('connectBtn').addEventListener('click', async () => {
        if (window.ethereum) {
            try {
                provider = new ethers.BrowserProvider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                signer = await provider.getSigner();
                address = await signer.getAddress();
                
                document.getElementById('walletAddress').innerText = address;
                document.getElementById('connectBtn').innerText = "Connected";
                updateBalance();
                speak("वॉलेट सफलतापूर्वक कनेक्ट हो गया है");
            } catch (err) {
                console.error(err);
                alert("Connection failed");
            }
        } else {
            alert("Please install Metamask or Arc Extension");
        }
    });

    async function updateBalance() {
        const balance = await provider.getBalance(address);
        document.getElementById('userBalance').innerText = parseFloat(ethers.formatEther(balance)).toFixed(4) + " ARC";
    }

    // Real-time Send
    async function sendTransaction() {
        const to = document.getElementById('toAddress').value;
        const amount = document.getElementById('sendAmount').value;

        if(!to || !amount) return alert("Details filled karein");

        try {
            speak("ट्रांजेक्शन प्रोसेस हो रहा है, कृपया प्रतीक्षा करें");
            const tx = await signer.sendTransaction({
                to: to,
                value: ethers.parseEther(amount)
            });

            addTxToLedger(tx.hash, amount, 'Send');
            await tx.wait(); // Waiting for real-time confirmation
            
            speak(`सफलतापूर्वक ${amount} टोकन भेज दिए गए हैं`);
            updateBalance();
        } catch (err) {
            alert("Transaction Failed: " + err.message);
        }
    }

    function addTxToLedger(hash, amount, type) {
        const container = document.getElementById('txHistory');
        const date = new Date().toLocaleString();
        const row = `
            <div class="tx-row">
                <div>
                    <strong>${type}</strong><br>
                    <span style="font-size:10px; color:#848e9c;">${date}</span>
                </div>
                <div style="text-align: right;">
                    <span class="status-success">${amount} USDC</span><br>
                    <a href="https://explorer.arc.network/tx/${hash}" target="_blank" class="tx-id">${hash.substring(0,10)}...</a>
                </div>
            </div>
        `;
        container.insertAdjacentHTML('afterbegin', row);
    }

    // Export Functionality
    function exportData(format) {
        if(format === 'pdf') {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("Arc Network Ledger", 10, 10);
            doc.save("Arc_Statement.pdf");
        } else {
            alert("Excel export ready - see console");
            // XLSX implementation for real table data
        }
    }
</script>
</body>
</html>
