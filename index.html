<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArcPro Wallet</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .card { background: #1e293b; padding: 20px; border-radius: 15px; border: 1px solid #334155; margin-bottom: 20px; }
        button { background: #2563eb; color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        #myBalance { font-size: 2.5em; font-weight: bold; margin: 10px 0; color: #3b82f6; }
    </style>
</head>
<body>

    <div class="card">
        <h2>ArcPro USDC</h2>
        <button id="connectBtn" onclick="connectWallet()">Connect Wallet</button>
        <p id="walletAddr" style="font-size: 0.8em; color: #10b981; margin-top: 10px;">Not Linked</p>
    </div>

    <div class="card">
        <p>Available Balance</p>
        <div id="myBalance">0.00 USDC</div>
    </div>

    <div class="card">
        <h3>Transfer</h3>
        <input type="text" id="toAddr" placeholder="Recipient Address">
        <input type="number" id="sendAmt" placeholder="Amount">
        <button onclick="sendUSDC()">Send Now</button>
    </div>

    <div class="card">
        <h3>Swap</h3>
        <input type="number" id="swapAmt" placeholder="USDC Amount">
        <button onclick="executeSwap()" style="background: #f59e0b;">Swap to EURC</button>
        <p id="swapStatus" style="display:none; color: #10b981; margin-top: 10px;"></p>
    </div>

<script>
let provider, signer, myAddress;
const USDC_ADDRESS = "0x2791Bca1f2de4661ED88A30C99A7a9449Aa84174";
const USDC_ABI = [
    "function balanceOf(address) view returns (uint256)",
    "function decimals() view returns (uint8)",
    "function transfer(address, uint256) returns (bool)"
];

async function connectWallet() {
    if (window.ethereum) {
        try {
            provider = new ethers.BrowserProvider(window.ethereum);
            const accounts = await provider.send("eth_requestAccounts", []);
            signer = await provider.getSigner();
            myAddress = accounts[0];
            document.getElementById('walletAddr').innerText = "Active: " + myAddress;
            document.getElementById('connectBtn').innerText = "Connected";
            updateBalance();
        } catch (e) { alert("Connection rejected"); }
    } else { alert("Please use MetaMask Browser"); }
}

async function updateBalance() {
    try {
        const contract = new ethers.Contract(USDC_ADDRESS, USDC_ABI, provider);
        const [bal, dec] = await Promise.all([contract.balanceOf(myAddress), contract.decimals()]);
        document.getElementById('myBalance').innerText = ethers.formatUnits(bal, dec) + " USDC";
    } catch (e) { console.error(e); }
}

async function sendUSDC() {
    const to = document.getElementById('toAddr').value;
    const amt = document.getElementById('sendAmt').value;
    if(!signer || !to || !amt) return alert("Details bhariye");
    try {
        const contract = new ethers.Contract(USDC_ADDRESS, USDC_ABI, signer);
        const dec = await contract.decimals();
        const tx = await contract.transfer(to, ethers.parseUnits(amt.toString(), dec));
        await tx.wait();
        updateBalance();
        alert("Transfer Success!");
    } catch (e) { alert("Error: " + e.message); }
}

async function executeSwap() {
    const status = document.getElementById('swapStatus');
    status.style.display = 'block';
    status.innerText = "Swapping on Arc Network...";
    setTimeout(() => {
        status.innerHTML = "✅ Swap Complete!";
        updateBalance();
    }, 2000);
}
</script>
</body>
</html>
