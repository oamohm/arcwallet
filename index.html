<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArcPro Unified USDC Wallet</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        body { background: #0b0f1a; color: #e2e8f0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 15px; max-width: 480px; margin: auto; }
        .card { background: #161e2d; padding: 20px; border-radius: 16px; margin-bottom: 15px; border: 1px solid #2d3748; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h2, h3 { margin: 0 0 10px 0; color: #3b82f6; }
        button { background: #3b82f6; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.3s; }
        button:hover { background: #2563eb; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #2d3748; background: #0b0f1a; color: white; box-sizing: border-box; }
        .status { color: #10b981; font-size: 0.85em; margin-top: 8px; word-break: break-all; }
        .balance-box { text-align: center; padding: 10px 0; }
        .balance-amount { font-size: 2.2em; font-weight: 800; color: #fff; margin: 5px 0; }
        table { width: 100%; font-size: 0.75em; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 8px; border-bottom: 1px solid #2d3748; }
    </style>
</head>
<body>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>ArcPro</h2>
            <button id="connectBtn" onclick="connectWallet()" style="width: auto; padding: 8px 15px;">Connect</button>
        </div>
        <p id="walletAddr" class="status">Wallet Not Connected</p>
    </div>

    <div class="card balance-box">
        <h3>Current Balance</h3>
        <div class="balance-amount" id="myBalance">0.00 USDC</div>
        <p style="font-size: 0.8em; color: #94a3b8;">Arc Network Testnet</p>
    </div>

    <div class="card">
        <h3>Send USDC</h3>
        <input type="text" id="toAddr" placeholder="Recipient Address (0x...)">
        <input type="number" id="sendAmt" placeholder="Amount">
        <button onclick="sendUSDC()">Transfer Now</button>
    </div>

    <div class="card">
        <h3>Wallet Checker</h3>
        <input type="text" id="checkAddr" placeholder="Enter address to check">
        <button onclick="checkAnyBalance()" style="background: #10b981;">Fetch Balance</button>
        <p id="checkResult" class="status" style="display:none;"></p>
    </div>

    <div class="card" style="border: 1px solid #b45309;">
        <h3>Instant Swap</h3>
        <input type="number" id="swapAmt" placeholder="USDC Amount">
        <button onclick="executeSwap()" style="background: #f59e0b;">Swap to EURC</button>
        <p id="swapStatus" class="status" style="display:none;"></p>
    </div>

    <div class="card">
        <h3>Activity Ledger</h3>
        <table>
            <thead><tr><th>Time</th><th>Action</th><th>Amount</th></tr></thead>
            <tbody id="ledgerBody"></tbody>
        </table>
    </div>

<script>
let provider, signer, myAddress;
const USDC_ADDRESS = "0x2791Bca1f2de4661ED88A30C99A7a9449Aa84174"; 
const USDC_ABI = [
    "function balanceOf(address) view returns (uint256)",
    "function decimals() view returns (uint8)",
    "function transfer(address, uint256) returns (bool)"
];

async function connectWallet() {
    if (window.ethereum) {
        try {
            provider = new ethers.BrowserProvider(window.ethereum);
            const accounts = await provider.send("eth_requestAccounts", []);
            signer = await provider.getSigner();
            myAddress = accounts[0];
            document.getElementById('walletAddr').innerText = "Active: " + myAddress;
            document.getElementById('connectBtn').innerText = "Linked";
            updateMyBalance();
        } catch (e) { alert("Link failed: " + e.message); }
    } else { alert("Please install MetaMask"); }
}

async function updateMyBalance() {
    if (!signer || !myAddress) return;
    try {
        const contract = new ethers.Contract(USDC_ADDRESS, USDC_ABI, provider);
        const [bal, dec] = await Promise.all([
            contract.balanceOf(myAddress),
            contract.decimals()
        ]);
        const formatted = ethers.formatUnits(bal, dec);
        document.getElementById('myBalance').innerText = parseFloat(formatted).toFixed(2) + " USDC";
    } catch (e) { console.error("Balance Error:", e); }
}
