<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arc Pro USDC Wallet</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --main: #2775ca; --bg: #010409; --card: #0d1117; --border: #30363d; --text: #c9d1d9; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 1000px; padding: 10px; }
        .navbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: var(--card); padding: 12px 20px; border-radius: 12px; border: 1px solid var(--border); }
        .logo-box { display: flex; align-items: center; gap: 10px; }
        .logo-img { width: 35px; height: 35px; border-radius: 8px; }
        .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .grid-layout { grid-template-columns: 1fr; } }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        h3 { margin-top: 0; font-size: 18px; color: white; display: flex; align-items: center; gap: 8px; }
        input { width: 100%; padding: 12px; background: #161b22; border: 1px solid var(--border); border-radius: 8px; color: white; margin: 8px 0; font-size: 14px; }
        .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .btn-primary { background: var(--main); color: white; }
        .btn-check { background: #238636; color: white; margin-top: 5px; }
        .balance-box { text-align: center; padding: 15px; border-radius: 12px; background: #161b22; margin-bottom: 15px; border-left: 4px solid var(--main); }
        .amt { font-size: 28px; font-weight: bold; color: white; }
        .ledger-container { overflow-x: auto; background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 15px; }
        table { width: 100%; border-collapse: collapse; min-width: 400px; }
        th { text-align: left; font-size: 12px; color: #8b949e; padding: 10px; border-bottom: 1px solid var(--border); }
        td { padding: 12px 10px; font-size: 13px; border-bottom: 1px solid #21262d; }
        .tx-link { color: var(--main); text-decoration: none; font-family: monospace; }
        .export-btns { display: flex; gap: 10px; margin-bottom: 10px; }
        .ex-small { padding: 5px 10px; font-size: 11px; background: #21262d; color: white; border: 1px solid var(--border); border-radius: 4px; cursor: pointer;}
    </style>
</head>
<body>
<div class="app-container">
    <div class="navbar">
        <div class="logo-box">
            <img src="logo.png" alt="Arc" class="logo-img" onerror="this.src='https://arc.network/favicon.ico'">
            <span style="font-weight: bold; color: white;">ArcPro USDC</span>
        </div>
        <button id="connectBtn" class="btn-primary" style="width: auto; padding: 8px 16px;">Connect Wallet</button>
    </div>

    <div class="grid-layout">
        <div class="card">
            <h3>USDC Wallet</h3>
            <div class="balance-box">
                <div style="font-size: 12px; color: #8b949e;">Your USDC Balance</div>
                <div class="amt" id="myBalance">0.00 <span style="font-size: 14px;">USDC</span></div>
                <div id="myAddr" style="font-size: 10px; color: #8b949e; margin-top: 5px; word-break: break-all;">Not Connected</div>
            </div>
            <input type="text" id="toAddr" placeholder="Recipient Address (0x...)">
            <input type="number" id="sendAmt" placeholder="Amount to Send">
            <button class="btn btn-primary" onclick="sendUSDC()">Send USDC Now</button>
        </div>

        <div class="card">
            <h3>USDC Checker</h3>
            <p style="font-size: 12px; color: #8b949e;">Check USDC balance of any wallet.</p>
            <input type="text" id="checkAddr" placeholder="Paste Wallet Address (0x...)">
            <button class="btn btn-check" onclick="checkAnyWallet()">Check Balance</button>
            <div id="checkResult" style="margin-top: 15px; padding: 10px; background: #161b22; border-radius: 8px; display: none;">
                <span style="font-size: 12px;">Result:</span>
                <div id="checkAmt" style="font-size: 20px; color: #0ecb81; font-weight: bold;">0.00 USDC</div>
            </div>
        </div>
    </div>

    <div class="ledger-container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h3 style="margin: 0;">Transaction Ledger</h3>
            <div class="export-btns">
                <button class="ex-small" onclick="exportData('pdf')">PDF</button>
                <button class="ex-small" onclick="exportData('xlsx')">Excel</button>
            </div>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Date & Time</th>
                    <th>Type</th>
                    <th>Amount</th>
                    <th>Transaction ID</th>
                </tr>
            </thead>
            <tbody id="ledgerBody"></tbody>
        </table>
    </div>
</div>

<script>
    let provider, signer, myAddress, usdcContract;
    
    // Yahan Arc Network ke USDC ka official smart contract address dalna padta hai.
    // Maine yahan standard test address dala hai, aap ise arc network docs se check kar sakte hain.
    const USDC_ADDRESS = "0x2791Bca1f2de4661ED88A30C99A7a9449Aa84174"; 
    
    // ERC20 token ko samajhne ke liye ABI
    const abi = [
        "function balanceOf(address owner) view returns (uint256)",
        "function decimals() view returns (uint8)",
        "function transfer(address to, uint amount) returns (bool)"
    ];

    const speak = (text) => {
        const speech = new SpeechSynthesisUtterance(text);
        speech.lang = 'en-US';
        speech.rate = 0.9;
        window.speechSynthesis.speak(speech);
    };

    document.getElementById('connectBtn').addEventListener('click', async () => {
        if (window.ethereum) {
            try {
                provider = new ethers.BrowserProvider(window.ethereum);
                const accounts = await provider.send("eth_requestAccounts", []);
                signer = await provider.getSigner();
                myAddress = accounts[0];
                
                // Smart contract connect karna USDC ke liye
                usdcContract = new ethers.Contract(USDC_ADDRESS, abi, signer);
                
                document.getElementById('myAddr').innerText = myAddress;
                document.getElementById('connectBtn').innerText = "Connected";
                updateMyBalance();
                speak("Wallet connected successfully");
            } catch (err) {
                alert("Connection rejected");
            }
        } else {
            alert("Please use Web3 browser or metamask extension.");
        }
    });

    async function updateMyBalance() {
        try {
            const bal = await usdcContract.balanceOf(myAddress);
            const decimals = await usdcContract.decimals();
            const formatted = ethers.formatUnits(bal, decimals);
            document.getElementById('myBalance').innerText = parseFloat(formatted).toFixed(4) + " USDC";
        } catch (error) {
            console.error("USDC contract error", error);
        }
    }

    async function checkAnyWallet() {
        const addr = document.getElementById('checkAddr').value;
        if(!ethers.isAddress(addr)) return alert("Invalid Address");
        try {
            const readContract = new ethers.Contract(USDC_ADDRESS, abi, provider);
            const bal = await readContract.balanceOf(addr);
            const decimals = await readContract.decimals();
            const formatted = parseFloat(ethers.formatUnits(bal, decimals)).toFixed(4);
            
            document.getElementById('checkResult').style.display = 'block';
            document.getElementById('checkAmt').innerText = `${formatted} USDC`;
            speak(`Wallet balance is ${formatted} USDC`);
        } catch (e) {
            alert("Network error ya address galat hai.");
        }
    }

    async function sendUSDC() {
        const to = document.getElementById('toAddr').value;
        const amt = document.getElementById('sendAmt').value;
        if(!to || !amt) return;

        try {
            speak("Initiating USDC transfer. Please confirm.");
            const decimals = await usdcContract.decimals();
            const parsedAmt = ethers.parseUnits(amt, decimals);
            
            const tx = await usdcContract.transfer(to, parsedAmt);
            addToLedger(tx.hash, amt);
            await tx.wait();
            
            speak("USDC Transfer confirmed.");
            updateMyBalance();
        } catch (e) {
            console.error(e);
            speak("Transfer failed. Please check funds.");
        }
    }
    function addToLedger(hash, amt) {
        const body = document.getElementById('ledgerBody');
        const now = new Date().toLocaleString();
        const row = `<tr>
            <td>${now}</td>
            <td style="color:#0ecb81">SEND</td>
            <td>${amt} USDC</td>
            <td><a href="https://explorer.arc.network/tx/${hash}" target="_blank" class="tx-link">${hash.substring(0,12)}...</a></td>
        </tr>`;
        body.insertAdjacentHTML('afterbegin', row);
    }

    function exportData(type) {
        if(type === 'pdf') {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("Arc USDC Ledger", 10, 10);
            doc.save("Arc_USDC_Report.pdf");
        } else {
            alert("Excel export processing...");
        }
  }
    // link to external logic
console.log("arcpro initialization complete");
</script>
</body>
</html>
