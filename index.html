<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArcPro Professional Wallet</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        :root { --bg: #0b0f1a; --card: #161e2d; --blue: #3b82f6; --text: #f1f5f9; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 15px; max-width: 450px; margin: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid #2d3748; margin-bottom: 15px; }
        .balance-amount { font-size: 2.8em; font-weight: 800; text-align: center; margin: 10px 0; color: #fff; }
        button { background: var(--blue); color: white; border: none; padding: 14px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #2d3748; background: #0b0f1a; color: white; box-sizing: border-box; }
        .ledger { width: 100%; font-size: 0.85em; border-collapse: collapse; margin-top: 10px; }
        .ledger td { padding: 10px; border-bottom: 1px solid #2d3748; }
        .status-text { font-size: 0.75em; color: #10b981; text-align: center; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="card" style="display: flex; justify-content: space-between; align-items: center;">
        <h2 style="margin:0; color: var(--blue);">ArcPro</h2>
        <button id="connectBtn" onclick="connectWallet()" style="width: auto; padding: 8px 16px;">Connect</button>
    </div>

    <div class="card">
        <p style="text-align: center; color: #94a3b8; margin: 0;">Arc Testnet USDC</p>
        <div class="balance-amount" id="myBalance">0.00</div>
        <p id="walletAddr" class="status-text">Disconnected</p>
    </div>

    <div class="card">
        <h3 style="margin:0 0 10px 0;">Send Asset</h3>
        <input type="text" id="toAddr" placeholder="Recipient Address">
        <input type="number" id="sendAmt" placeholder="Amount">
        <button onclick="sendUSDC()">Transfer Now</button>
    </div>

    <div class="card">
        <h3 style="margin:0 0 10px 0;">Activity Ledger</h3>
        <table class="ledger">
            <tbody id="ledgerBody">
                <tr><td style="color:#94a3b8; text-align:center;">No activity yet</td></tr>
            </tbody>
        </table>
    </div>

<script>
let provider, signer, myAddress;
const USDC_ADDRESS = "0x2791Bca1f2de4661ED88A30C99A7a9449Aa84174"; 
const USDC_ABI = [
    "function balanceOf(address) view returns (uint256)",
    "function decimals() view returns (uint8)",
    "function transfer(address, uint256) returns (bool)"
];

async function connectWallet() {
    if (window.ethereum) {
        try {
            provider = new ethers.BrowserProvider(window.ethereum);
            const accounts = await provider.send("eth_requestAccounts", []);
            signer = await provider.getSigner();
            myAddress = accounts[0];
            document.getElementById('walletAddr').innerText = "Linked: " + myAddress;
            document.getElementById('connectBtn').innerText = "Connected";
            updateBalance();
        } catch (e) { alert("connection rejected"); }
    } else { alert("Open this in MetaMask Browser app"); }
}

async function updateBalance() {
    const contract = new ethers.Contract(USDC_ADDRESS, USDC_ABI, provider);
    const [bal, dec] = await Promise.all([contract.balanceOf(myAddress), contract.decimals()]);
    document.getElementById('myBalance').innerText = ethers.formatUnits(bal, dec);
}

async function sendUSDC() {
    const to = document.getElementById('toAddr').value;
    const amt = document.getElementById('sendAmt').value;
    if(!signer || !to || !amt) return alert("missing details");
    try {
        const contract = new ethers.Contract(USDC_ADDRESS, USDC_ABI, signer);
        const dec = await contract.decimals();
        const tx = await contract.transfer(to, ethers.parseUnits(amt.toString(), dec));
        addLedger("Sent", amt);
        await tx.wait();
        updateBalance();
    } catch (e) { alert("error: " + e.message); }
}

function addLedger(type, amt) {
    const ledger = document.getElementById('ledgerBody');
    if(ledger.innerText.includes("No activity")) ledger.innerHTML = "";
    const row = `<tr><td>${new Date().toLocaleTimeString()}</td><td>${type}</td><td>${amt} USDC</td></tr>`;
    ledger.insertAdjacentHTML('afterbegin', row);
}
</script>
</body>
</html>
